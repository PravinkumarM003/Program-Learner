# Render deployment config for this monorepo
# Backend and frontend services plus a managed MySQL database.

databases:
  - name: pylearn-db
    engine: mysql
    version: 8
    plan: free

services:
  - type: web
    name: program-learner-backend
    env: node
    root: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase: pylearn-db
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://program-learner.onrender.com

  - type: static
    name: program-learner
    env: static
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://program-learner-backend.onrender.com/api
