# Render deployment config for this monorepo
# Backend and frontend services plus a managed MySQL database.

databases:
  - name: pylearn-db
    engine: mysql
    version: 8
    plan: free

services:
  - type: web
    name: program-learner-backend
    env: node
    root: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase: pylearn-db
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://program-learner.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://program-learner.onrender.com/api/auth/google/callback
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  - type: static
    name: program-learner
    env: static
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://program-learner.onrender.com/api
      - key: VITE_AUTH_URL
        value: https://program-learner.onrender.com/api/auth/google
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyBROE5uXMGhYb_v-_ZUwiqeEUVNNtgqRuE
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: py-lerner.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: py-lerner
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: py-lerner.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: 180531370291
      - key: VITE_FIREBASE_APP_ID
        value: 1:180531370291:web:cc968dfc52ba3a80a04646
